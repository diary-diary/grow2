<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grow-a-Garden — Minecraft Server</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Фоновые блоки -->
  <div class="bg-blocks"></div>

  <div class="main-wrapper">
    
    <!-- Карточка сервера -->
    <div class="server-card">
      <div class="card-icon">🏡</div>
      <h1 class="server-title">Grow-a-Garden</h1>
      <p class="server-desc">Уютный сервер для садоводов и строителей</p>
      
      <div class="ip-block">
        <span class="ip-text" id="server-ip">play.growagarden.ru</span>
        <button class="copy-btn" id="copy-ip">📋 Копировать</button>
      </div>

      <div class="status-row">
        <div class="status-badge" id="server-status">
          <span class="dot"></span> Проверка...
        </div>
        <span class="players" id="players-online"></span>
      </div>
    </div>

    <!-- Карточка профиля -->
    <div class="profile-card" id="profile-card">
      <div class="profile-top" id="profile-top">
        <div class="profile-avatar" id="profile-avatar">🌿</div>
        <div class="profile-info">
          <span class="profile-name" id="profile-name">Гость</span>
          <span class="profile-balance">💰 <span id="profile-balance">0</span> монет</span>
        </div>
        <span class="profile-arrow">▼</span>
      </div>

      <div class="profile-expand hidden" id="profile-expand">
        <button class="btn btn-green" id="deposit-btn">💎 Пополнить баланс</button>
        
        <div class="section">
          <p class="section-label">📜 История</p>
          <div class="history-box" id="history-box">
            <p class="empty-text">Пока пусто</p>
          </div>
        </div>

        <div class="section">
          <p class="section-label">🎟️ Промокод</p>
          <input type="text" class="promo-input" placeholder="Введите код..." id="promo-input">
          <button class="btn btn-small btn-gold" id="promo-btn">Активировать</button>
        </div>

        <button class="btn btn-red" id="logout-btn">🚪 Выйти</button>
      </div>
    </div>

    <!-- Нижний текст -->
    <p class="footer-text">🌸 Выращивай • Строй • Дружи 🌸</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
