<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grow-a-Garden — Minecraft Server</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Фон -->
  <div class="sky-bg">
    <div class="stars"></div>
    <div class="moon"></div>
    <canvas id="fireflies"></canvas>
  </div>
  <div class="ground"></div>

  <!-- Контент -->
  <div class="content">
    
    <!-- Карточка сервера -->
    <div class="server-card">
      <div class="server-icon">🌸</div>
      <h1>Grow-a-Garden</h1>
      <p>Уютный сервер Minecraft</p>
      
      <div class="ip-box">
        <code id="server-ip">play.growagarden.ru</code>
        <button id="copy-ip">📋</button>
      </div>

      <div class="status-line">
        <span id="server-status" class="status checking">● проверка</span>
        <span id="players-count"></span>
      </div>
    </div>

    <!-- Карточка профиля -->
    <div class="profile-card" id="profile-card">
      <div class="profile-bar" id="profile-bar">
        <div class="avatar" id="avatar">🌿</div>
        <div class="name-balance">
          <span id="nickname">Гость</span>
          <span class="bal">💰 <span id="balance">0</span></span>
        </div>
        <span class="arrow" id="arrow">▾</span>
      </div>

      <div class="profile-body hidden" id="profile-body">
        
        <!-- Ввод ника -->
        <div class="nick-input-row">
          <input type="text" id="nick-input" placeholder="Твой ник..." maxlength="16">
          <button id="save-nick">✓</button>
        </div>

        <!-- Пополнение -->
        <div class="deposit-row">
          <input type="number" id="deposit-amount" placeholder="Сумма" min="1" max="10000">
          <button id="deposit-btn">💎 Пополнить</button>
        </div>

        <!-- Баланс и быстрые суммы -->
        <div class="quick-amounts">
          <button data-amount="100">+100</button>
          <button data-amount="500">+500</button>
          <button data-amount="1000">+1k</button>
        </div>

        <!-- История -->
        <div class="section-title">📜 История</div>
        <div class="history-list" id="history-list">
          <span class="empty">Пока пусто</span>
        </div>

        <!-- Промокод -->
        <div class="section-title">🎟️ Промокод</div>
        <div class="promo-row">
          <input type="text" id="promo-input" placeholder="Код...">
          <button id="promo-btn">→</button>
        </div>
        <span id="promo-msg" class="promo-msg"></span>

        <!-- Выход -->
        <button id="logout-btn" class="logout-btn">🚪 Выйти</button>
      </div>
    </div>

    <footer>🌱 Выращивай • Строй • Дружи 🌱</footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
