<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grow-a-Garden — Уютный сервер Minecraft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- Шапка -->
    <header class="main-header">
      <h1 class="logo">🌱 Grow-a-Garden</h1>
      <div class="profile-area" id="profile-area">
        <div class="avatar" id="avatar">🌿</div>
        <span class="nickname-header" id="nickname-display">Гость</span>
        <!-- Выпадающий профиль -->
        <div class="profile-dropdown hidden" id="profile-dropdown">
          <div class="dropdown-top">
            <div class="avatar-large" id="dropdown-avatar">🌿</div>
            <div class="dropdown-info">
              <span id="dropdown-nickname">Гость</span>
              <span class="dropdown-balance">💰 <span id="dropdown-balance-value">0</span> монет</span>
            </div>
          </div>
          <button id="top-up-btn" class="btn-green">Пополнить +100</button>
          <div class="dropdown-section">
            <p class="section-title">📜 История покупок</p>
            <ul id="history-list" class="history-list"></ul>
          </div>
          <div class="dropdown-section">
            <p class="section-title">🎟️ Промокоды</p>
            <p class="dimmed">Скоро появятся</p>
          </div>
          <button id="logout-btn" class="btn-brown">Выйти</button>
        </div>
      </div>
    </header>

    <!-- Основной блок -->
    <main class="main-content">
      <div class="welcome-text">
        <p>Добро пожаловать в уютный мир садоводства!</p>
        <p class="sub">Выращивай, строй, дружи 🌻</p>
      </div>

      <div class="server-block">
        <div class="ip-box">
          <span>IP: <strong id="server-ip">play.growagarden.ru</strong></span>
          <button id="copy-ip" title="Скопировать IP">📋</button>
        </div>
        <div id="server-status" class="status offline">Проверка статуса...</div>
        <div id="players-online" class="players-count"></div>
      </div>
    </main>

    <footer>
      <p>© 2026 Grow-a-Garden – Растим мир вместе!</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
