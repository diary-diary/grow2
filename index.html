<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grow-a-Garden Market — Профиль</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- Шапка с профилем -->
    <header class="main-header">
      <h1>🛒 Grow-a-Garden Market</h1>
      <div class="profile-icon" id="profile-icon">
        <span class="avatar">👤</span>
        <span id="nickname-display" class="nickname-header">Гость</span>
      </div>
      <!-- Выпадающее меню профиля -->
      <div class="profile-dropdown hidden" id="profile-dropdown">
        <div class="dropdown-header">
          <span id="dropdown-nickname">Гость</span>
          <span id="dropdown-balance" class="dropdown-balance">0 монет</span>
        </div>
        <button id="top-up-btn">Пополнить +100</button>
        <div class="dropdown-section">
          <p class="dropdown-title">📜 История покупок</p>
          <ul id="history-list" class="history-list">
            <li class="empty-history">Пока пусто</li>
          </ul>
        </div>
        <div class="dropdown-section">
          <p class="dropdown-title">🎟️ Промокоды</p>
          <p class="coming-soon">Скоро появятся</p>
        </div>
        <button id="logout-btn" class="logout-btn">Выйти</button>
      </div>
    </header>

    <!-- Основная информация -->
    <section class="server-info">
      <div class="ip-box">
        <span>IP: <strong id="server-ip">play.growagarden.ru</strong></span>
        <button id="copy-ip" title="Скопировать IP">📋</button>
      </div>
      <div id="server-status" class="status offline">Проверка статуса...</div>
      <div id="players-online" class="players-count"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
