<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grow-a-Garden — Minecraft Server</title>
  
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="icons/site.webmanifest">
  <meta name="theme-color" content="#2d4a1e">
  
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Фон -->
  <div class="sky-bg">
    <div class="stars"></div>
    <div class="moon"></div>
    <div class="clouds-layer">
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
      <div class="cloud cloud-3"></div>
      <div class="cloud cloud-4"></div>
    </div>
    <canvas id="fireflies"></canvas>
  </div>
  <div class="ground">
    <div class="dirt-layers"></div>
  </div>

  <!-- Контент -->
  <div class="content">
    
    <div class="top-buttons">
      <button class="top-btn" id="info-btn">
        <span class="info-icon"></span> Инфо
      </button>
      <button class="top-btn" id="rules-btn">
        <span class="rules-icon"></span> Правила
      </button>
      <button class="top-btn" id="support-btn">
        <span class="support-icon"></span> Поддержка
      </button>
    </div>

    <div class="server-card">
      <h1>Grow-a-Garden</h1>
      <p>Уютный сервер Minecraft</p>
      
      <div class="ip-box">
        <code id="server-ip">play.growagarden.ru</code>
        <button id="copy-ip">
          <span class="copy-icon"></span>
        </button>
      </div>

      <div class="status-line">
        <span id="server-status" class="status checking">
          <span class="status-dot"></span> проверка
        </span>
        <span id="players-count"></span>
      </div>
    </div>

    <div class="profile-card" id="profile-card">
      <div class="profile-bar" id="profile-bar">
        <div class="avatar" id="avatar">
          <div class="pixel-leaf-detailed">
            <div class="leaf-stem"></div>
            <div class="leaf-body"></div>
            <div class="leaf-vein"></div>
          </div>
        </div>
        <span id="nickname">Гость</span>
        <span class="arrow" id="arrow"></span>
      </div>

      <div class="profile-body hidden" id="profile-body">
        
        <div class="nick-input-row">
          <input type="text" id="nick-input" placeholder="Твой никнейм..." maxlength="16" disabled>
        </div>

        <div class="auth-actions" id="auth-actions">
          <button id="open-auth-btn" class="auth-btn">Войти / Регистрация</button>
          <button id="logout-btn" class="logout-btn" style="display:none;">
            <span class="exit-icon"></span> Выйти
          </button>
        </div>

        <div class="server-details">
          <div class="detail-item">
            <span class="detail-label">Версия</span>
            <span class="detail-value">1.20.1+</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">Режим</span>
            <span class="detail-value">Выживание</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">Сложность</span>
            <span class="detail-value">Средняя</span>
          </div>
        </div>
      </div>
    </div>

    <footer>Выращивай • Строй • Дружи</footer>
  </div>

  <!-- Модальное окно (инфо/правила/поддержка) -->
  <div class="modal hidden" id="modal">
    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="modal-window" id="modal-window">
      <div class="modal-header">
        <h2 id="modal-title"></h2>
        <button class="modal-close" id="modal-close">
          <span class="close-cross"></span>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- Модальное окно авторизации -->
  <div class="modal hidden" id="auth-modal">
    <div class="modal-overlay" id="auth-overlay"></div>
    <div class="auth-window">
      <div class="auth-header">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Вход</button>
          <button class="auth-tab" data-tab="register">Регистрация</button>
        </div>
        <button class="modal-close" id="auth-close">
          <span class="close-cross"></span>
        </button>
      </div>
      <div class="auth-body">
        <!-- Форма входа -->
        <form class="auth-form" id="login-form">
          <div class="auth-field">
            <label>Никнейм</label>
            <input type="text" id="login-nick" placeholder="Введи ник..." maxlength="16" required>
          </div>
          <div class="auth-field">
            <label>Пароль</label>
            <input type="password" id="login-pass" placeholder="Введи пароль..." maxlength="32" required>
          </div>
          <button type="submit" class="auth-submit">Войти</button>
          <p class="auth-msg" id="login-msg"></p>
        </form>
        <!-- Форма регистрации -->
        <form class="auth-form hidden" id="register-form">
          <div class="auth-field">
            <label>Никнейм</label>
            <input type="text" id="reg-nick" placeholder="Придумай ник..." maxlength="16" required>
          </div>
          <div class="auth-field">
            <label>Пароль</label>
            <input type="password" id="reg-pass" placeholder="Придумай пароль..." maxlength="32" required>
          </div>
          <div class="auth-field">
            <label>Повтори пароль</label>
            <input type="password" id="reg-pass2" placeholder="Повтори пароль..." maxlength="32" required>
          </div>
          <button type="submit" class="auth-submit">Зарегистрироваться</button>
          <p class="auth-msg" id="reg-msg"></p>
        </form>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
